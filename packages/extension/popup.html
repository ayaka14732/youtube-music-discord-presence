<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Music Discord Presence</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="logo" aria-hidden="true">♫</div>
        <div>
          <h1>YouTube Music</h1>
          <p>Discord Presence</p>
        </div>
        <label class="switch" title="Enable or disable Discord Presence">
          <input id="enabled" type="checkbox" />
          <span></span>
        </label>
      </header>

      <section class="now-playing">
        <div class="eyebrow">Current activity</div>
        <div id="song" class="song">Waiting for YouTube Music…</div>
        <div id="artist" class="artist">Start playing a song to share it</div>
      </section>

      <section class="status-grid">
        <div>
          <span class="label">Native Host</span>
          <span id="host-status" class="status">Checking</span>
        </div>
        <div>
          <span class="label">Discord</span>
          <span id="discord-status" class="status">Checking</span>
        </div>
      </section>

      <section class="settings">
        <label for="pause-timeout">Hide after pause</label>
        <select id="pause-timeout">
          <option value="0">Immediately</option>
          <option value="1">1 minute</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="30">30 minutes</option>
          <option value="-1">Never</option>
        </select>
      </section>

      <div id="error" class="error" hidden></div>
      <button id="reconnect" type="button">Reconnect</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
